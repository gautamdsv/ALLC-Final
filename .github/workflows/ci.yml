name: ALLC Safety-Net CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Vite
        run: npm run build

  backend-verify:
    name: Backend Verify & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Health Check — Backend starts without crash
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 4000
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          DIRECT_URL: "postgresql://test:test@localhost:5432/test"
          ACCESS_TOKEN_SECRET: "ci-test-access-secret"
          REFRESH_TOKEN_SECRET: "ci-test-refresh-secret"
          ACCESS_TOKEN_TTL: "15m"
          REFRESH_TOKEN_TTL_DAYS: 7
          CORS_ORIGIN: "http://localhost:5173"
        run: |
          # Start server in background, wait for it, then kill
          timeout 8 node src/server.js &
          SERVER_PID=$!
          sleep 3
          # If server is still running after 3s, it started successfully
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "✅ Backend started successfully"
            kill $SERVER_PID
          else
            echo "❌ Backend crashed on startup"
            exit 1
          fi

      - name: Run Tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          DIRECT_URL: "postgresql://test:test@localhost:5432/test"
          ACCESS_TOKEN_SECRET: "ci-test-access-secret"
          REFRESH_TOKEN_SECRET: "ci-test-refresh-secret"
          ACCESS_TOKEN_TTL: "15m"
          REFRESH_TOKEN_TTL_DAYS: 7
          CORS_ORIGIN: "http://localhost:5173"
        run: npm test --if-present
